name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      # Playwright startet den Server selbst (playwright.config webServer: löscht die
      # e2e-DB, seedet die Fixtures via e2e/migrate-db.ts und startet `next dev` mit
      # NODE_ENV=development, Test-Secrets und AUTH_DEV_LOGIN=true). Das ist exakt der
      # lokal grüne Pfad. Ein produktions-echter Container scheidet hier bewusst aus:
      # er verlangt echte Secrets UND verbietet den e2e-Demo-Login, und gegen einen
      # externen Base-URL werden die Fixtures nicht geseedet.
      - name: E2E (Playwright)
        run: pnpm exec playwright test
      # Smoke: sicherstellen, dass das Produktions-Image weiterhin baut (relevant auf
      # PRs, wo der publish-Job nicht läuft). Nur Build, kein Run/Health.
      - name: Docker build smoke
        run: docker build -t lagerbuch:ci .

  publish:
    needs: [check, e2e]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=edge,branch=main
            type=sha,prefix=sha-
            type=semver,pattern=v{{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
